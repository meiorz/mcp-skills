name: Validate Skill

on:
  pull_request:
    paths:
      - "skills/**/SKILL.md"
      - "scripts/**"
      - "SCHEMA.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate every skill file
        run: |
          node scripts/check-deps.mjs
          node scripts/build-index.js
          if [ -d skills ]; then
            find skills -name SKILL.md -print0 | xargs -0 -r -n 1 node scripts/validate-skill.js
          fi
