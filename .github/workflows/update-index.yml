name: Update Index

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "skills/**/SKILL.md"
      - "scripts/**"

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Rebuild registry index
        run: |
          node scripts/check-deps.mjs
          node scripts/build-index.js
